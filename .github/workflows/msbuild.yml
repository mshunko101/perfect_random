name: MSBuild with Artifacts

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

    - name: Collect Artifacts
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        # Определяем путь к собранным файлам
        $outputPath = "${{env.GITHUB_WORKSPACE}}\bin\${{env.BUILD_CONFIGURATION}}"
        # Создаем директорию для артефактов, если её нет
        New-Item -ItemType Directory -Force -Path artifacts
        # Копируем необходимые файлы
        Copy-Item -Path "$outputPath\*" -Destination "artifacts" -Recurse

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4  # Обновленная версия
      with:
        name: build-artifacts
        path: artifacts
        retention-days: 7  # Опционально: установка срока хранения
