name: MSBuild with Release

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - '**.sln'
      - '**.vcxproj'
      - '.github/workflows/msbuild.yml'  # Только если изменился сам workflow
  release:
    types: [created]

env:
  SOLUTION_FILE_PATH: ./src/Rand++.sln
  BUILD_CONFIGURATION: Release
  ARTIFACTS_DIR: artifacts

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    if: |
      github.event_name != 'release' ||
      (github.event_name == 'release' &&
       startsWith(github.event.release.tag_name, 'v'))

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1

    - name: Restore NuGet packages
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build solution
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

    - name: Create artifacts directory
      run: |
        New-Item -ItemType Directory -Force -Path ${{env.ARTIFACTS_DIR}}

    - name: Copy additional files from repository
      run: |
        Copy-Item -Path "README.md" -Destination "${{env.ARTIFACTS_DIR}}" -Force
        Copy-Item -Path "LICENSE" -Destination "${{env.ARTIFACTS_DIR}}" -Force
        Copy-Item -Path "rand++.hpp" -Destination "${{env.ARTIFACTS_DIR}}" -Force


    - name: Compress build output
      run: |
        $outputPath = ".\src\x64\${{env.BUILD_CONFIGURATION}}"
        $zipPath = "${{env.ARTIFACTS_DIR}}\build-artifacts.zip"

        if (Test-Path $outputPath) {
            Write-Host "Копируем бинарные файлы в директорию артефактов"
            Copy-Item -Path "$outputPath\*.exe" -Destination "${{env.ARTIFACTS_DIR}}" -Recurse -Force
            Write-Host "Архивируем все файлы из директории артефактов в $zipPath"
            Compress-Archive -Path "${{env.ARTIFACTS_DIR}}\*" -DestinationPath $zipPath -Force
            Write-Host "Архив успешно создан: $zipPath"
        } else {
            Write-Error "Выходная директория не найдена: $outputPath"
            exit 1
        }

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      if: |
        github.event_name == 'push' &&
        !contains(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.MSHUNKO_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          Сборка проекта Rand++

          **Версия:** v${{ github.run_number }}
          **Дата сборки:** ${{ github.event.head_commit.timestamp }}
          **Коммит:** ${{ github.sha }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      if: |
        always() &&
        steps.create_release.outcome == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.MSHUNKO_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{env.ARTIFACTS_DIR}}/build-artifacts.zip
        asset_name: Rand++-v${{ github.run_number }}.zip
        asset_content_type: application/zip

    - name: Cleanup
      if: always()
      run: |
        if (Test-Path ${{env.ARTIFACTS_DIR}}) {
            Remove-Item -Path ${{env.ARTIFACTS_DIR}} -Recurse -Force
            Write-Host "Временные файлы очищены"
        }
