name: MSBuild with Artifacts

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  SOLUTION_FILE_PATH: ./src/Rand++.sln
  BUILD_CONFIGURATION: Release
  ARTIFACTS_ZIP: artifacts/build-artifacts.zip

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

    - name: Create Artifacts Directory
      run: |
        New-Item -ItemType Directory -Force -Path artifacts

    - name: Compress Build Output
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        $outputPath = ".\src\x64\${{env.BUILD_CONFIGURATION}}"
        
        if (Test-Path $outputPath) {
            Write-Host "Создаем архив артефактов..."
            Compress-Archive -Path "$outputPath\*" -DestinationPath ${{env.ARTIFACTS_ZIP}}
            Write-Host "Архив создан: $(Get-ChildItem artifacts)"
        } else {
            Write-Error "Выходная директория не найдена"
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-zip
        path: ${{env.ARTIFACTS_ZIP}}
        retention-days: 7

    - name: Cleanup (опционально)
      if: always()
      run: |
        Remove-Item -Path artifacts -Recurse -Force
